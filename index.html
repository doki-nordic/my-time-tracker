<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Status Application</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 16px;
      color: #333;
    }

    p {
      font-size: 16px;
      color: #666;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    a {
      display: inline-block;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 10px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .link-status {
      background: #667eea;
      color: white;
    }

    .link-status:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .link-control {
      background: #764ba2;
      color: white;
    }

    .link-control:hover {
      background: #65408a;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
    }

    .link-monitor {
      background: #48bb78;
      color: white;
    }

    .link-monitor:hover {
      background: #38a169;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
    }

    .info {
      font-size: 12px;
      color: #999;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="links">
      <a href="status.html" class="link-status">📱 Status Display</a>
      <a href="control.html" class="link-control">⚙️ Control Panel</a>
      <a href="monitor-gnome.py" class="link-monitor" download>🔒 GNOME Monitor Script</a>
    </div>
  </div>
</body>
</html>
